<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum - Project Los Santos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Dancing+Script:wght@700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-[#0a0a0f] text-white">
    <div id="nav-container"></div>
    
    <main class="pt-24 pb-12 px-4 min-h-screen">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                <div>
                    <h1 class="text-5xl font-bold bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent mb-2" style="font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em;">
                        COMMUNITY FORUM
                    </h1>
                    <p class="text-gray-400">Discuss, report bugs, and share suggestions</p>
                </div>
                <button onclick="openNewTopicModal()" class="px-6 py-3 bg-gradient-to-r from-cyan-600 to-blue-600 rounded-lg font-semibold hover:shadow-[0_0_20px_rgba(0,212,255,0.3)] transition-all flex items-center gap-2">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                    New Topic
                </button>
            </div>

            <div class="grid lg:grid-cols-4 gap-6">
                <aside class="lg:col-span-1 space-y-4">
                    <div class="bg-[#15151f] rounded-xl border border-white/5 p-4">
                        <h3 class="font-semibold mb-4 text-gray-300">Categories</h3>
                        <nav class="space-y-2" id="category-list">
                            <button onclick="filterCategory('all')" class="w-full text-left px-4 py-3 rounded-lg bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 font-medium transition-all">
                                All Topics
                            </button>
                            <button onclick="filterCategory('general')" class="w-full text-left px-4 py-3 rounded-lg hover:bg-white/5 text-gray-400 hover:text-white transition-all">
                                General Discussion
                            </button>
                            <button onclick="filterCategory('support')" class="w-full text-left px-4 py-3 rounded-lg hover:bg-white/5 text-gray-400 hover:text-white transition-all">
                                Support
                            </button>
                            <button onclick="filterCategory('bugs')" class="w-full text-left px-4 py-3 rounded-lg hover:bg-white/5 text-gray-400 hover:text-white transition-all">
                                Bug Reports
                            </button>
                            <button onclick="filterCategory('suggestions')" class="w-full text-left px-4 py-3 rounded-lg hover:bg-white/5 text-gray-400 hover:text-white transition-all">
                                Suggestions
                            </button>
                        </nav>
                    </div>

                    <div class="bg-[#15151f] rounded-xl border border-white/5 p-4">
                        <h3 class="font-semibold mb-4 text-gray-300">Stats</h3>
                        <div class="space-y-3 text-sm">
                            <div class="flex justify-between">
                                <span class="text-gray-500">Total Topics</span>
                                <span class="text-white font-medium" id="total-topics">156</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-500">Total Replies</span>
                                <span class="text-white font-medium">1,240</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-500">Online Users</span>
                                <span class="text-green-400 font-medium">89</span>
                            </div>
                        </div>
                    </div>
                </aside>

                <div class="lg:col-span-3 space-y-4" id="topics-container">
                    <div class="bg-[#15151f] rounded-xl border border-white/5 overflow-hidden">
                        <div class="p-4 border-b border-white/5 bg-white/5 flex items-center gap-4 text-sm text-gray-400">
                            <span class="flex-1">Topic</span>
                            <span class="w-24 text-center hidden md:block">Replies</span>
                            <span class="w-32 text-center hidden md:block">Last Post</span>
                        </div>
                        <div id="topics-list" class="divide-y divide-white/5">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="new-topic-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-[#15151f] rounded-2xl border border-white/10 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b border-white/10 flex justify-between items-center">
                <h2 class="text-2xl font-bold">Create New Topic</h2>
                <button onclick="closeNewTopicModal()" class="text-gray-400 hover:text-white">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Category</label>
                    <select id="new-topic-category" class="w-full bg-[#0a0a0f] border border-white/10 rounded-lg px-4 py-3 text-white focus:border-cyan-500 focus:outline-none">
                        <option value="general">General Discussion</option>
                        <option value="support">Support</option>
                        <option value="bugs">Bug Reports</option>
                        <option value="suggestions">Suggestions</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Title</label>
                    <input type="text" id="new-topic-title" class="w-full bg-[#0a0a0f] border border-white/10 rounded-lg px-4 py-3 text-white focus:border-cyan-500 focus:outline-none" placeholder="Enter topic title...">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Content</label>
                    <textarea id="new-topic-content" rows="6" class="w-full bg-[#0a0a0f] border border-white/10 rounded-lg px-4 py-3 text-white focus:border-cyan-500 focus:outline-none resize-none" placeholder="Describe your topic..."></textarea>
                </div>
                <button onclick="submitNewTopic()" class="w-full py-3 bg-gradient-to-r from-cyan-600 to-blue-600 rounded-lg font-semibold hover:shadow-[0_0_20px_rgba(0,212,255,0.3)] transition-all">
                    Post Topic
                </button>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>
    
    <script src="js/main.js" type="module"></script>
    <script src="js/forum_logic.js" type="module"></script>
</body>
</html>
